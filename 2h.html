        <style>
            @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&family=Montserrat:wght@700&display=swap');
            body {
                background: #101522;
                font-family: 'Montserrat', 'Cairo', Arial, sans-serif;
                color: #fff;
                margin: 0;
                padding: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow-x: hidden;
            }
            h1 {
                font-family: 'Montserrat', 'Cairo', Arial, sans-serif;
                color: #6a82fb;
                font-size: 2.2rem;
                margin-bottom: 18px;
                letter-spacing: 2px;
                text-shadow: 0 2px 12px #aee7ff55;
            }
            .card {
                max-width: 600px;
                line-height: 2;
                font-size: 1.25rem;
                background: transparent;
                color: #fff;
                padding: 22px 32px;
                border-radius: 18px;
                margin-bottom: 22px;
                text-align: center;
                font-weight: bold;
                letter-spacing: 1px;
                font-family: 'Cairo', 'Montserrat', Arial, sans-serif;
                position: relative;
                z-index: 1;
            }
            .card-border {
                position: absolute;
                inset: 0;
                border-radius: 18px;
                padding: 3px;
                background: linear-gradient(270deg, #aee7ff, #6a82fb, #aee7ff, #6a82fb);
                background-size: 400% 400%;
                animation: borderMove 6s linear infinite;
                z-index: -1;
                pointer-events: none;
            }
            @keyframes borderMove {
                0% {background-position: 0% 50%;}
                50% {background-position: 100% 50%;}
                100% {background-position: 0% 50%;}
            }
            .buttons-container {
                width: 100vw;
                display: flex;
                justify-content: space-between;
                position: fixed;
                bottom: 40px;
                left: 0;
                pointer-events: none;
            }
            .side-btn {
                background: linear-gradient(90deg, #6a82fb 40%, #fc5c7d 100%);
                color: #fff;
                border: none;
                border-radius: 50px;
                padding: 16px 38px;
                font-size: 1.1rem;
                font-family: 'Montserrat', Arial, sans-serif;
                font-weight: bold;
                box-shadow: 0 4px 24px #6a82fb55;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
                pointer-events: auto;
                outline: none;
                margin: 0 24px;
                letter-spacing: 1px;
                position: relative;
                z-index: 2;
            }
            .side-btn:hover {
                background: linear-gradient(90deg, #fc5c7d 40%, #6a82fb 100%);
                transform: scale(1.08) translateY(-4px);
                box-shadow: 0 8px 32px #fc5c7d88;
            }
            .side-btn a {
                color: inherit;
                text-decoration: none;
                font-weight: bold;
            }
            /* Responsive */
            @media (max-width: 700px) {
                .card {
                    font-size: 1rem;
                    padding: 14px 8px;
                }
                .buttons-container {
                    bottom: 10px;
                }
                .side-btn {
                    padding: 12px 18px;
                    font-size: 0.95rem;
                    margin: 0 6px;
                }
            }
        </style>
    </head>

</html>
